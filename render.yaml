# render.yaml — Declarative deploy config for Render.com
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: zupps-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Render sets PORT automatically; our CMD binds to 5000 which matches EXPOSE
    envVars:
      - key: DATABASE_URL
        sync: false          # set manually in Render dashboard (from Supabase)
      - key: JWT_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false          # e.g. https://zupps-eats.vercel.app
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false          # e.g. https://zupps-eats.vercel.app
      - key: PROVISIONAL_TOKEN_SECRET
        sync: false
      - key: PROVISIONAL_TOKEN_TTL
        value: "15"
      - key: SOCIAL_REQUEST_TIMEOUT
        value: "5"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_PUBLIC_KEY
        sync: false
